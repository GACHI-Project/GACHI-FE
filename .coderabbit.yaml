# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ko-KR'

reviews:
  profile: 'chill'
  request_changes_workflow: false

  high_level_summary: true
  review_status: true
  review_details: true

  poem: true

  pre_merge_checks:
    docstrings:
      mode: 'off'

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - 'develop'
      - 'main'

chat:
  auto_reply: true
